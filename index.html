<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pohaan Mohammadkhil | Portfolio</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f4;
text-align:center;
}

/* Header */

header{
background:#1e3a8a;
color:white;
padding:40px 20px;
}

header h1{
margin:0;
font-size:36px;
}

header p{
margin-top:10px;
font-size:18px;
}

/* Section */

section{
padding:40px 20px;
}

/* Gallery */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.gallery img{
width:100%;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* Footer */

footer{
margin-top:40px;
background:#111;
color:white;
padding:20px;
font-size:14px;
}

</style>

</head>


<body>


<header>

<h1>Pohaan Mohammadkhil</h1>

<p>Pashto Typing Specialist | Graphic Designer</p>

</header>


<section>

<h2>My Design Portfolio</h2>

<div class="gallery">

<img src="Bruchers.png" alt="Design">
<img src="Certificates.png" alt="Design">
<img src="Cover Page.png" alt="Design">
<img src="digital poster.png" alt="Design">
<img src="Logo.jpg" alt="Design">
<img src="Poster.png" alt="Design">
<img src="Poster1.png" alt="Design">
<img src="Poster3.png" alt="Design">
<img src="Poster4.png" alt="Design">

</div>

</section>


<footer>

<p>© 2026 Pohaan Mohammadkhil | All Rights Reserved</p>

</footer>


</body>
</html>
