<h2>ریاضي ازموینه</h2>

<p>2 + 2 = ؟</p>

<button onclick="check(0)">3</button>
<button onclick="check(1)">4</button>
<button onclick="check(2)">5</button>
<button onclick="check(3)">6</button>

<p id="result"></p>

<script>
function check(x){

if(x==1){
document.getElementById("result").innerHTML="صحیح ځواب"
}else{
document.getElementById("result").innerHTML="غلط ځواب"
}

}
</script>
