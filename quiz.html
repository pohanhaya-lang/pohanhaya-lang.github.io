<!DOCTYPE html>
<html lang="ps">
<head>
<meta charset="UTF-8">
<title>Kankor Quiz</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.quiz-box{
background:white;
padding:20px;
margin:50px auto;
width:400px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

button{
display:block;
width:100%;
padding:10px;
margin:5px 0;
font-size:16px;
}
</style>

</head>

<body>

<div class="quiz-box">

<h2 id="question">Loading...</h2>

<button onclick="checkAnswer(0)" id="a"></button>
<button onclick="checkAnswer(1)" id="b"></button>
<button onclick="checkAnswer(2)" id="c"></button>
<button onclick="checkAnswer(3)" id="d"></button>

<p id="score"></p>

</div>

<script>

let questions=[
{
q:"2 + 2 = ؟",
options:["3","4","5","6"],
answer:1
},

{
q:"5 × 3 = ؟",
options:["15","10","20","8"],
answer:0
},

{
q:"د افغانستان پلازمینه څه ده؟",
options:["کابل","کندهار","هرات","مزار"],
answer:0
}

]

let current=0
let score=0

function loadQuestion(){

let q=questions[current]

document.getElementById("question").innerText=q.q
document.getElementById("a").innerText=q.options[0]
document.getElementById("b").innerText=q.options[1]
document.getElementById("c").innerText=q.options[2]
document.getElementById("d").innerText=q.options[3]

}

function checkAnswer(i){

if(i==questions[current].answer){
score++
}

current++

if(current<questions.length){
loadQuestion()
}else{
document.querySelector(".quiz-box").innerHTML=
"<h2>نتیجه</h2><p>ستاسو نمره: "+score+"</p>"
}

}

loadQuestion()

</script>

</body>
</html>
